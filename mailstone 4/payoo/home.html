<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo|Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- tailwind and daisyUi -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    *{
        
      font-family: "Outfit", sans-serif;
  

    }
</style>
</head>
<body class="min-h-screen max-w-screen-md bg-base-200 mx-auto">
 <header class="border-b-2 border-gray-300 sticky top-0 bg-base-300 z-10">
  <section class="w-11/12 mx-auto py-5 flex justify-between items-center" >
     <div class="left flex gap-1">
    <div class="log w-[60px]">
      <img src="./assets/logo.png" alt="there is a payoo logo">
    </div>
    <div>
      <h1 class="font-extrabold text-[18px]">$<span id="balance">45000</span></h1>
      <p class="text-neutral/50">Available Balance</p>
    </div>
  </div>
  <div class="right">
    <a href="/index.html" class=" btn text-neutral/50 "> Log Out <i class="fa-solid fa-right-from-bracket"></i></a>
  </div>
  </section>
 
  
 </header>

 <!-- button section -->

 <section class="w-11/12 mx-auto space-y-5">
  <h2 class="text-3xl font-bold pt-16">Welcome to Pay<span class="text-purple-600">oo</span></h2>
 <p class="text-neutral/50 ">Enjoy easy and convenient financial services with us. <br>Cashout charge is low and </p>
    
 <!-- buttons -->

 <div class="buttons grid grid-cols-3 gap-5 ">
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-1.png" alt="">
     <p>Add Money</p>
  </button>
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-2.png" alt="">
     <p>Cashout</p>
  </button>
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-3.png" alt="">
     <p>Transfer Money</p>
  </button>
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-4.png" alt="">
     <p>Get Bonus</p>
  </button>
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-5.png" alt="">
     <p>Pay Bill</p>
  </button>
  <button class="btn flex-col h-full py-5 btn-primary btn-soft ">
    <img src="./assets/opt-6.png" alt="">
     <p>Transactions</p>
  </button>
 </div>
  

 </section>
   <!-- cashout form -->

<section id="cashout" class="w-11/12 mx-auto py-5">
 <h2 class="text-3xl font-semibold">Cash Out</h2>
<div class="form pt-10">
    <div class="card bg-base-100 w-full  mx-auto">
      <div class="card-body">
        <fieldset class="fieldset space-y-1">
          <label class="label text-neutral font-bold">Agent Number</label>
          <input id="cashout-number" type="text" class="input bg-base-200 w-full rounded-full" placeholder="Enter 11 digit number" maxlength="11" minlength="11" />

          <label class="label text-neutral font-bold">Amount</label>
          <input id="cashout-amount" type="text" class="input bg-base-200 w-full rounded-full" placeholder="Enter amount to withdraw" maxlength="11" minlength="11" />

          <label class="label text-neutral font-bold">Pin Number</label>
          <input id="cashout-pin" type="password" class="input bg-base-200 w-full rounded-full" placeholder="Enter 4 digit pin number" maxlength="4" />

          <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full text-base-100 text-[20px]
          ">Withdraw Money</button>
         
        </fieldset>
      </div>
    </div>
  </div>


</section>
 <script src="./script/machine.js"></script>
 
<script src="./script/cashout.js"></script>
 
</body>
</html>
