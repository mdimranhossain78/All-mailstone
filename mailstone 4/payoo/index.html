<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo|Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- tailwind and daisyUi -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
    *{
        
  font-family: "Outfit", sans-serif;
  

    }
</style>
</head>
<body class="min-h-screen max-w-screen-md bg-base-200 mx-auto">
  <div class="max-w-[250px] mx-auto pt-32">
    <img src="./assets/Logo-full.png" alt="">
  </div>
  <div class="form pt-10">
    <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
      <div class="card-body">
        <fieldset class="fieldset space-y-1">
          <label class="label text-neutral font-bold">Mobile Number</label>
          <input id="mobile-number" type="text" class="input bg-base-200  rounded-full" placeholder="Enter your number" maxlength="11" minlength="11" />
          <label class="label text-neutral font-bold">4 Digit Pin</label>
          <input id="loging-password" type="password" class="input bg-base-200  rounded-full" placeholder="Enter 4 Digit Pin" maxlength="4" />
          <button id="login-btn" class="btn btn-primary mt-4 rounded-full text-base-100 text-[20px]
          ">Login</button>
          <img src="" alt="">
        </fieldset>
      </div>
    </div>
  </div>
  <script src="./script/login.js"></script>
</body>
</html>
